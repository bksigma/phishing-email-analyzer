<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="auth-page">
    <div class="login-card">
        <button onclick="toggleTheme()" class="theme-toggle">🌙 / ☀️</button>

        <span class="badge">Create Account</span>
        <h1 class="auth-title">Join the System</h1>
        <p class="auth-subtitle">Register to analyze suspicious emails and track your history.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="success">{{ success }}</div>
        {% endif %}

        <form method="POST">
            <label class="label">Username</label>
            <input type="text" name="username" placeholder="Choose username" required>

            <label class="label">Password</label>
            <input type="password" name="password" placeholder="Minimum 6 characters" required>

            <button type="submit" class="btn primary full">Create Account</button>
        </form>

        <p class="hint">
            Already have an account?
            <a href="/login">Login here</a>
        </p>
    </div>
</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("light-mode");
    localStorage.setItem("theme", document.body.classList.contains("light-mode") ? "light" : "dark");
}
if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light-mode");
}
</script>

</body>
</html>
